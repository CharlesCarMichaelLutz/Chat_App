name: Deploy Chat_App
on: [workflow_dispatch]

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            -t ${{ secrets.DOCKER_USERNAME }}/chatapp:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/chatapp:latest \
            .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/chatapp:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/chatapp:latest

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: rabbit-chat
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: "${{ secrets.DOCKER_USERNAME }}/chatapp:latest"
